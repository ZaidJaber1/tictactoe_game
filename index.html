
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
#ttt-root{
  font-family:'Orbitron',sans-serif;
  background:#020010;
  width:100%;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;position:relative;overflow:hidden;
}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.ttt-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  width:100%;max-width:520px;
}
h1.title{
  font-size:clamp(16px,5vw,32px);font-weight:900;letter-spacing:clamp(2px,1.5vw,6px);
  color:#fff;text-shadow:0 0 12px #0ff,0 0 28px #0ff;
  margin-bottom:2px;text-align:center;
}
.subtitle{font-size:clamp(7px,1.8vw,11px);letter-spacing:clamp(3px,2vw,8px);color:#0ff;opacity:.6;margin-bottom:clamp(10px,2.5vw,18px);text-align:center;}
.scores{
  display:flex;gap:clamp(8px,2vw,24px);
  margin-bottom:clamp(8px,2vw,16px);
  width:100%;justify-content:center;
}
.score-card{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(0,255,255,.04);
  border:1px solid rgba(0,255,255,.18);
  border-radius:8px;
  padding:clamp(5px,1.5vw,10px) clamp(12px,3vw,22px);
  flex:1;max-width:130px;
}
.score-card.x-card{border-color:rgba(0,180,255,.4);background:rgba(0,180,255,.06);}
.score-card.o-card{border-color:rgba(255,0,200,.4);background:rgba(255,0,200,.06);}
.score-label{font-size:clamp(7px,1.6vw,10px);letter-spacing:2px;color:#888;margin-bottom:2px;text-align:center;}
.score-val{font-size:clamp(20px,5vw,30px);font-weight:900;line-height:1;}
.score-card.x-card .score-val{color:#00b4ff;text-shadow:0 0 10px #00b4ff;}
.score-card.o-card .score-val{color:#ff00c8;text-shadow:0 0 10px #ff00c8;}
.score-card.draw-card .score-val{color:#0ff;text-shadow:0 0 8px #0ff;}
.status{
  font-size:clamp(9px,2.5vw,13px);letter-spacing:2px;color:#0ff;
  margin-bottom:clamp(8px,2vw,14px);min-height:18px;text-align:center;
  text-shadow:0 0 8px #0ff;transition:color .3s;
}
.status.win{color:#ffe000;text-shadow:0 0 10px #ffe000;}
.status.draw{color:#a0a0ff;text-shadow:0 0 10px #a0a0ff;}
.board-wrap{width:100%;display:flex;justify-content:center;margin-bottom:clamp(12px,3vw,20px);}
.board{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(4px,1.5vw,8px);
  width:min(92vw,300px);
}
@media(min-width:480px){.board{width:min(75vw,340px);}}
@media(min-width:768px){.board{width:min(65vw,360px);}}
@media(min-width:1024px){.board{width:360px;}}
.cell{
  aspect-ratio:1;
  background:rgba(0,255,255,.03);
  border:1px solid rgba(0,255,255,.18);
  border-radius:clamp(6px,2vw,10px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:border-color .2s,background .2s,transform .12s;
  font-size:clamp(28px,10vw,52px);font-weight:900;
  user-select:none;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.cell:hover:not(.taken){
  border-color:#0ff;background:rgba(0,255,255,.09);
  box-shadow:0 0 16px rgba(0,255,255,.25);transform:scale(1.04);
}
.cell:active:not(.taken){transform:scale(.96);}
.cell.taken{cursor:default;}
.cell .sym{display:inline-block;animation:popIn .22s cubic-bezier(.34,1.56,.64,1) forwards;}
.cell .sym.x-sym{color:#00b4ff;text-shadow:0 0 14px #00b4ff,0 0 30px #0080ff;}
.cell .sym.o-sym{color:#ff00c8;text-shadow:0 0 14px #ff00c8,0 0 30px #c000a0;}
.cell.win-cell{
  border-color:#ffe000!important;background:rgba(255,224,0,.08)!important;
  box-shadow:0 0 20px rgba(255,224,0,.4)!important;
  animation:winPulse 1s ease-in-out infinite;
}
.cell .ripple{
  position:absolute;border-radius:50%;
  background:rgba(0,255,255,.25);
  transform:scale(0);animation:rippleOut .5s ease-out forwards;
  pointer-events:none;
}
@keyframes popIn{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
@keyframes rippleOut{to{transform:scale(4);opacity:0;}}
@keyframes winPulse{0%,100%{box-shadow:0 0 20px rgba(255,224,0,.4);}50%{box-shadow:0 0 38px rgba(255,224,0,.85);}}
.controls{display:flex;gap:clamp(6px,2vw,12px);justify-content:center;margin-bottom:clamp(8px,2vw,14px);flex-wrap:wrap;}
.btn{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(8px,1.8vw,11px);letter-spacing:2px;font-weight:700;
  padding:clamp(7px,1.8vw,10px) clamp(12px,3vw,20px);
  border-radius:6px;border:1px solid;cursor:pointer;
  transition:all .18s;background:transparent;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  min-height:36px;
}
.btn:active{transform:scale(.95);}
.btn-cyan{color:#0ff;border-color:rgba(0,255,255,.5);}
.btn-cyan:hover{background:rgba(0,255,255,.12);box-shadow:0 0 14px rgba(0,255,255,.3);}
.btn-pink{color:#ff00c8;border-color:rgba(255,0,200,.5);}
.btn-pink:hover{background:rgba(255,0,200,.1);box-shadow:0 0 14px rgba(255,0,200,.3);}
.ai-controls{display:flex;align-items:center;gap:clamp(8px,2vw,14px);flex-wrap:wrap;justify-content:center;}
.ai-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:clamp(8px,1.8vw,11px);letter-spacing:2px;color:#888;-webkit-tap-highlight-color:transparent;}
.ai-toggle input{display:none;}
.ai-switch{
  width:38px;height:20px;border-radius:10px;
  border:1px solid rgba(0,255,255,.3);
  background:rgba(0,0,0,.5);position:relative;transition:background .2s;
  flex-shrink:0;
}
.ai-switch::after{
  content:'';position:absolute;top:3px;left:3px;
  width:12px;height:12px;border-radius:50%;background:#444;
  transition:transform .2s,background .2s;
}
.ai-toggle input:checked+.ai-switch{background:rgba(0,255,255,.2);border-color:#0ff;}
.ai-toggle input:checked+.ai-switch::after{transform:translateX(18px);background:#0ff;box-shadow:0 0 6px #0ff;}
.diff-select{
  font-family:'Orbitron',sans-serif;font-size:clamp(8px,1.8vw,10px);letter-spacing:1px;
  background:rgba(0,0,0,.5);color:#0ff;
  border:1px solid rgba(0,255,255,.3);border-radius:5px;
  padding:clamp(5px,1.2vw,7px) clamp(8px,2vw,12px);
  cursor:pointer;outline:none;min-height:32px;
}
.diff-select option{background:#020010;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;}
</style>

<div id="ttt-root">
  <canvas id="bg-canvas"></canvas>
  <div class="ttt-inner">
    <h2 class="sr-only">Cyberpunk Tic Tac Toe — responsive game with AI opponent and neon visuals</h2>
    <h1 class="title">TIC TAC TOE</h1>
    <div class="scores">
      <div class="score-card x-card"><div class="score-label">PLAYER X</div><div class="score-val" id="sx">0</div></div>
      <div class="score-card draw-card"><div class="score-label">DRAW</div><div class="score-val" id="sd">0</div></div>
      <div class="score-card o-card"><div class="score-label" id="o-label">PLAYER O</div><div class="score-val" id="so">0</div></div>
    </div>
    <div class="status" id="status">PLAYER X TURN</div>
    <div class="board-wrap">
      <div class="board" id="board">
        <div class="cell" data-i="0"></div><div class="cell" data-i="1"></div><div class="cell" data-i="2"></div>
        <div class="cell" data-i="3"></div><div class="cell" data-i="4"></div><div class="cell" data-i="5"></div>
        <div class="cell" data-i="6"></div><div class="cell" data-i="7"></div><div class="cell" data-i="8"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-cyan" id="restartBtn">↺ RESTART</button>
      <button class="btn btn-pink" id="resetBtn">⊗ RESET SCORES</button>
    </div>
    <div class="ai-controls">
      <label class="ai-toggle">
        <input type="checkbox" id="aiToggle">
        <div class="ai-switch"></div>
        AI OPPONENT
      </label>
      <select class="diff-select" id="diffSelect">
        <option value="easy">EASY</option>
        <option value="medium" selected>MEDIUM</option>
        <option value="hard">HARD</option>
      </select>
    </div>
  </div>
</div>

<script>
(function(){
const AC=window.AudioContext||window.webkitAudioContext;
let actx;
function getCtx(){if(!actx&&AC){try{actx=new AC();}catch(e){}}return actx;}
function resume(){const c=getCtx();if(c&&c.state==='suspended')c.resume();}
function playClick(){try{const c=getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(880,c.currentTime);o.frequency.exponentialRampToValueAtTime(440,c.currentTime+.06);g.gain.setValueAtTime(.08,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.08);o.start();o.stop(c.currentTime+.08);}catch(e){}}
function playWin(){try{const c=getCtx();if(!c)return;[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.07,c.currentTime+i*.1);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.1+.22);o.start(c.currentTime+i*.1);o.stop(c.currentTime+i*.1+.22);});}catch(e){}}
function playDraw(){try{const c=getCtx();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(300,c.currentTime);o.frequency.exponentialRampToValueAtTime(100,c.currentTime+.3);g.gain.setValueAtTime(.06,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.3);}catch(e){}}

const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board=Array(9).fill(null),cur='X',over=false;
let scores={X:0,O:0,D:0};
let aiOn=false,diff='medium',aiThinking=false;

const cells=[...document.querySelectorAll('.cell')];
const statusEl=document.getElementById('status');
const sxEl=document.getElementById('sx'),soEl=document.getElementById('so'),sdEl=document.getElementById('sd');
const oLabel=document.getElementById('o-label');
const aiToggle=document.getElementById('aiToggle');
const diffSel=document.getElementById('diffSelect');

function checkWin(b,p){return WINS.find(w=>w.every(i=>b[i]===p))||null;}
function checkDraw(b){return b.every(c=>c!==null);}

function minimax(b,isMax,depth,alpha,beta){
  if(checkWin(b,'O'))return 10-depth;
  if(checkWin(b,'X'))return depth-10;
  if(b.every(c=>c))return 0;
  if(isMax){let best=-Infinity;for(let i=0;i<9;i++){if(!b[i]){b[i]='O';const v=minimax(b,false,depth+1,alpha,beta);b[i]=null;best=Math.max(best,v);alpha=Math.max(alpha,v);if(beta<=alpha)break;}}return best;}
  else{let best=Infinity;for(let i=0;i<9;i++){if(!b[i]){b[i]='X';const v=minimax(b,true,depth+1,alpha,beta);b[i]=null;best=Math.min(best,v);beta=Math.min(beta,v);if(beta<=alpha)break;}}return best;}
}
function getAiMove(){
  const empty=board.map((c,i)=>c===null?i:-1).filter(i=>i>=0);
  if(!empty.length)return null;
  if(diff==='easy')return empty[Math.floor(Math.random()*empty.length)];
  if(diff==='medium'&&Math.random()<.35)return empty[Math.floor(Math.random()*empty.length)];
  let best=-Infinity,move=empty[0];
  for(const i of empty){board[i]='O';const v=minimax(board,false,0,-Infinity,Infinity);board[i]=null;if(v>best){best=v;move=i;}}
  return move;
}

function ripple(cell){
  const r=document.createElement('div');r.className='ripple';
  const s=cell.offsetWidth*1.8+'px';
  r.style.cssText=`width:${s};height:${s};left:${cell.offsetWidth/2-cell.offsetWidth*.9}px;top:${cell.offsetHeight/2-cell.offsetHeight*.9}px`;
  cell.appendChild(r);setTimeout(()=>r.remove(),520);
}
function render(){
  board.forEach((v,i)=>{
    const c=cells[i];c.innerHTML='';
    c.classList.toggle('taken',!!v);
    if(v){const sp=document.createElement('span');sp.className='sym '+(v==='X'?'x-sym':'o-sym');sp.textContent=v;c.appendChild(sp);}
  });
}
function setStatus(msg,cls=''){statusEl.textContent=msg;statusEl.className='status '+(cls||'');}
function updateScores(){sxEl.textContent=scores.X;soEl.textContent=scores.O;sdEl.textContent=scores.D;}

function applyMove(i,player){
  board[i]=player;ripple(cells[i]);render();
  const w=checkWin(board,player);
  if(w){
    over=true;scores[player]++;updateScores();
    w.forEach(j=>cells[j].classList.add('win-cell'));
    const msg=aiOn&&player==='O'?'A.I. WINS! ◈':player+' WINS! ★';
    setStatus(msg,'win');playWin();return true;
  }
  if(checkDraw(board)){over=true;scores.D++;updateScores();setStatus('DRAW — WELL PLAYED','draw');playDraw();return true;}
  return false;
}

function doMove(i){
  if(board[i]||over||aiThinking)return;
  resume();playClick();
  if(applyMove(i,'X'))return;
  cur='O';
  if(aiOn){
    aiThinking=true;
    setStatus('A.I. THINKING...');
    setTimeout(()=>{
      aiThinking=false;
      if(over)return;
      const m=getAiMove();
      if(m!=null){playClick();if(!applyMove(m,'O')){cur='X';setStatus('PLAYER X TURN');}}
    },480);
  } else {
    setStatus('PLAYER O TURN');
  }
}

function handleOMove(i){
  if(board[i]||over||aiThinking)return;
  resume();playClick();
  if(applyMove(i,'O'))return;
  cur='X';setStatus('PLAYER X TURN');
}

cells.forEach(c=>c.addEventListener('click',()=>{
  const i=+c.dataset.i;
  if(aiOn){if(cur==='X')doMove(i);}
  else{if(cur==='X')doMove(i);else handleOMove(i);}
}));

function restart(){
  board=Array(9).fill(null);cur='X';over=false;aiThinking=false;
  cells.forEach(c=>{c.innerHTML='';c.classList.remove('taken','win-cell');});
  setStatus('PLAYER X TURN');
}
function resetAll(){restart();scores={X:0,O:0,D:0};updateScores();}

document.getElementById('restartBtn').addEventListener('click',()=>{resume();restart();});
document.getElementById('resetBtn').addEventListener('click',()=>{resume();resetAll();});
aiToggle.addEventListener('change',e=>{aiOn=e.target.checked;oLabel.textContent=aiOn?'A.I.':'PLAYER O';restart();});
diffSel.addEventListener('change',e=>{diff=e.target.value;restart();});

const canvas=document.getElementById('bg-canvas');
const gctx=canvas.getContext('2d');
let parts=[];
function mkParts(){
  parts=[];
  const n=Math.min(60,Math.floor(canvas.width*canvas.height/8000));
  for(let i=0;i<n;i++)parts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*1.4+.3});
}
function resizeCanvas(){
  canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;mkParts();
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function animBg(){
  const W=canvas.width,H=canvas.height,t=Date.now()/1000;
  gctx.clearRect(0,0,W,H);
  gctx.strokeStyle='rgba(0,255,255,0.055)';gctx.lineWidth=.5;
  const gs=Math.max(40,Math.min(W,H)/7);
  for(let x=0;x<=W;x+=gs){gctx.beginPath();gctx.moveTo(x,0);gctx.lineTo(x,H);gctx.stroke();}
  for(let y=0;y<=H;y+=gs){gctx.beginPath();gctx.moveTo(0,y);gctx.lineTo(W,y);gctx.stroke();}
  gctx.strokeStyle='rgba(255,0,200,0.035)';
  for(let x=0;x<=W;x+=gs*2){const off=Math.sin(t+x*.012)*7;gctx.beginPath();gctx.moveTo(x+off,0);gctx.lineTo(x+off,H);gctx.stroke();}
  parts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    const a=.2+.3*Math.sin(t*1.1+p.x*.04);
    gctx.beginPath();gctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    gctx.fillStyle=`rgba(0,200,255,${a})`;gctx.fill();
  });
  requestAnimationFrame(animBg);
}
animBg();
})();
</script>
